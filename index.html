        // --- UTILITY FUNGSI API GEMINI AI ---
        const callGeminiJson = async (prompt, schema, apiKey) => {
          if (!apiKey) throw new Error("API_KEY_MISSING");
          
          const modelsToTry = ['gemini-2.5-flash-preview-09-2025', 'gemini-2.5-flash', 'gemini-1.5-flash'];
          const workingModel = localStorage.getItem('simr_working_model');
          const models = workingModel ? [workingModel, ...modelsToTry.filter(m => m !== workingModel)] : modelsToTry;

          let lastError;
          
          for (const model of models) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
            const payload = {
              contents: [{ parts: [{ text: prompt }] }],
              systemInstruction: { parts: [{ text: "Anda adalah pakar manajemen risiko layanan kesehatan (Puskesmas/RS). Jawab selalu dalam format JSON yang valid murni tanpa markdown formatting tambahan (tanpa backticks ```json)." }] },
              generationConfig: { responseMimeType: "application/json", responseSchema: schema, temperature: 0.2 }
            };

            let delay = 1000;
            let successData = null;

            for (let i = 0; i < 5; i++) {
              try {
                const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                const data = await response.json();

                if (!response.ok) {
                  const errMsg = data.error?.message?.toLowerCase() || "";
                  if (errMsg.includes("api key not valid") || response.status === 403) throw new Error("API_KEY_INVALID");
                  if (response.status === 404 || errMsg.includes("not found")) throw new Error("MODEL_NOT_FOUND");
                  if (response.status === 429 || response.status >= 500) throw new Error("RETRY_REQUIRED");
                  throw new Error("FATAL_ERROR"); 
                }
                successData = data; 
                break; 
              } catch (e) {
                lastError = e;
                if (e.message === "API_KEY_INVALID" || e.message === "MODEL_NOT_FOUND" || e.message === "FATAL_ERROR") break; 
                console.warn(`[Auto-Detect] Model ${model} sibuk. Mencoba ulang... (${i+1}/5)`);
                if (i < 4) { await new Promise(res => setTimeout(res, delay)); delay *= 2; }
              }
            }

            if (successData) {
              localStorage.setItem('simr_working_model', model);
              window.dispatchEvent(new CustomEvent('model-detected', { detail: model }));
              let textResponse = successData.candidates[0].content.parts[0].text;
              textResponse = textResponse.replace(/```json\n?/g, '').replace(/```\n?/g, '').trim();
              return JSON.parse(textResponse);
            }
            if (lastError?.message === "API_KEY_INVALID") throw lastError;
            if (workingModel === model) localStorage.removeItem('simr_working_model');
          }
          throw new Error("SERVER_BUSY_OR_QUOTA_EXCEEDED");
        };

                      </div>
                      <div className="col-span-6 md:col-span-3"><label className="text-xs font-semibold text-slate-500 uppercase">PIC RTP</label><input type="text" value={risiko.rtp.pj} onChange={(e) => updateRisiko(risiko.id, 'rtp', e.target.value, 'pj')} className="w-full p-2 border rounded mt-1 outline-none" /></div>
                      <div className="col-span-6 md:col-span-3"><label className="text-xs font-semibold text-slate-500 uppercase">Target Waktu RTP</label><input type="text" value={risiko.rtp.target} onChange={(e) => updateRisiko(risiko.id, 'rtp', e.target.value, 'target')} className="w-full p-2 border rounded mt-1 outline-none" placeholder="Cth: Agustus 2026"/></div>
                    </div>
                  </div>
                );
              })}
              <button onClick={() => setActiveStep(8)} className="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-2 rounded-lg flex items-center ml-auto mt-4">Lanjut ke Form Komunikasi <Icon name="ChevronRight" className="w-4 h-4 ml-2" /></button>
            </div>
          );

          const renderStep8 = () => (
            <div className="space-y-6 animate-in fade-in slide-in-from-bottom-4">
              <div className="p-4 bg-white border border-slate-200 rounded text-sm text-slate-600"><i>Bagian form komunikasi dan pemantauan. Lanjut ke finalisasi dokumen.</i><br/><button onClick={()=>setActiveStep(9)} className="mt-4 bg-emerald-600 text-white px-4 py-2 rounded">Lanjut ke Pusat Cetak</button></div>
            </div>
          );

          const renderStep9 = () => (
            <div className="space-y-6 animate-in fade-in slide-in-from-bottom-4">
              <div className="bg-emerald-50 p-6 rounded-xl shadow-sm border border-emerald-200 print:hidden flex flex-col sm:flex-row sm:items-center justify-between">
                <div><h2 className="text-2xl font-bold text-emerald-900">Pusat Cetak Formulir Mutu</h2><p className="text-sm text-emerald-700 mt-1">Pilih format laporan baku level Unit untuk dicetak atau disimpan sebagai PDF.</p></div>
                <div className="mt-4 sm:mt-0 flex gap-2 w-full sm:w-auto">
                  <select value={selectedFormPrint} onChange={(e) => setSelectedFormPrint(e.target.value)} className="w-full sm:w-auto p-2 border border-emerald-300 rounded-md font-semibold text-emerald-800 outline-none shadow-sm cursor-pointer">
                     <option value="FORM 2">1. Form 2C: Konteks Faskes</option><option value="FORM 3">2. Form 3C: Identifikasi Risiko</option><option value="RCA">3. Form RCA: Root Cause</option>
                     <option value="FORM 4">4. Form 4: Analisis Risiko</option><option value="FORM 5">5. Form 5: Daftar Risiko Prioritas</option><option value="FMEA">6. Form FMEA: Bedah Proses</option>
                     <option value="FORM 7">7. Form 7: Rencana Tindak Lanjut</option><option value="FORM 8">8. Form 8: Pengkomunikasian</option><option value="FORM 9">9. Form 9: Pemantauan Kontrol</option>
                     <option value="FORM 10">10. Form 10: Pencatatan Event</option><option value="PETA">11. Peta Risiko (Heatmap)</option>
                  </select>
                  <button onClick={() => window.print()} className="bg-emerald-800 hover:bg-emerald-900 text-white px-4 py-2 rounded-md shadow flex items-center justify-center shrink-0"><Icon name="Printer" className="w-4 h-4 sm:mr-2"/> <span className="hidden sm:inline">Cetak</span></button>
                </div>
              </div>

              <div className="bg-white p-2 sm:p-8 rounded-xl shadow-sm border border-slate-200 print:shadow-none print:border-none print:p-0 overflow-x-auto min-h-[600px]">
                {selectedFormPrint === 'FORM 2' && <PrintForm2 />}
                {selectedFormPrint === 'FORM 3' && <PrintForm3 />}
                {selectedFormPrint === 'RCA' && <PrintRCA />}
                {selectedFormPrint === 'FORM 4' && <PrintForm4 />}
                {selectedFormPrint === 'FORM 5' && <PrintForm5 />}
                {selectedFormPrint === 'FMEA' && <PrintFMEA />}
                {selectedFormPrint === 'FORM 7' && <PrintForm7 />}
                {selectedFormPrint === 'FORM 8' && <PrintForm8 />}
                {selectedFormPrint === 'FORM 9' && <PrintForm9 />}
                {selectedFormPrint === 'FORM 10' && <PrintForm10 />}
                {selectedFormPrint === 'PETA' && <PrintPetaRisiko />}
              </div>
            </div>
          );

          return (
            <div className="flex h-screen bg-slate-50 font-sans overflow-hidden">
              {toastMsg && (
                <div className="fixed top-10 left-1/2 transform -translate-x-1/2 z-[100] bg-slate-900 text-white px-6 py-3 rounded-full shadow-2xl text-sm font-bold flex items-center border border-slate-700 animate-in slide-in-from-top-4">
                  <Icon name="Check" className="w-5 h-5 mr-2 text-emerald-400"/> {toastMsg}
                </div>
              )}

              {isSidebarOpen && <div className="fixed inset-0 bg-slate-900/50 z-20 md:hidden print:hidden" onClick={() => setIsSidebarOpen(false)} />}
              
              {renderSidebar()}
              
              <main className="flex-1 flex flex-col min-w-0 overflow-hidden bg-slate-100 print:bg-white">
                <header className="bg-white shadow-sm border-b px-4 py-3 flex items-center justify-between z-10 sticky top-0 print:hidden">
                  <div className="flex items-center">
                    <button onClick={() => setIsSidebarOpen(!isSidebarOpen)} className="p-2 mr-3 bg-emerald-50 text-emerald-700 hover:bg-emerald-100 rounded-lg"><Icon name="Menu" className="w-5 h-5" /></button>
                    <h2 className="text-sm md:text-lg font-bold text-slate-800 truncate">
                      {['', 'Penetapan Konteks', 'Form 3: Identifikasi', 'RCA', 'Form 4: Analisis', 'Form 5: Prioritas', 'Analisis FMEA', 'Form 7: RTP', 'Form 8 & 9: Komunikasi', 'Pusat Cetak'][activeStep]}
                    </h2>
                  </div>
                </header>
                <div className="flex-1 overflow-y-auto p-4 md:p-8 print:p-0 relative">
                  <div className="max-w-6xl mx-auto pb-20 print:pb-0">
                    {activeStep === 1 && renderStep1()}
                    {activeStep === 2 && renderStep2()}
                    {activeStep === 3 && renderStep3()}
                    {activeStep === 4 && renderStep4()}
                    {activeStep === 5 && renderStep5()}
                    {activeStep === 6 && renderStep6()}
                    {activeStep === 7 && renderStep7()}
                    {activeStep === 8 && renderStep8()}
                    {activeStep === 9 && renderStep9()}
                  </div>
                </div>
              </main>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
